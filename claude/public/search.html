          <button type="submit" class="sb-icon sb-search" aria-label="Search">
            <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
