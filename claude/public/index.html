<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home">
  <header class="top-nav">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <button class="apps-btn" aria-label="Google apps">
      <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#5f6368" d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
    <button class="signin-btn">Sign in</button>
  </header>

  <main class="home-main">
    <img class="logo-img" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google" width="272" height="92" />

    <form class="search-form" id="searchForm" action="search.html" method="get" autocomplete="off">
      <div class="search-box">
        <svg class="icon-search" width="20" height="20" viewBox="0 0 24 24"><path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
        <input type="text" name="q" id="q" class="search-input" aria-label="Search" autofocus />
        <button type="button" class="icon-btn" aria-label="Search by voice">
          <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z"/><path fill="#34A853" d="M11 18.92h2V22h-2z"/><path fill="#FBBC05" d="M17.91 11a5.92 5.92 0 01-11.82 0H4.34a7.66 7.66 0 0014.32 0z"/></svg>
        </button>
        <button type="button" class="icon-btn" aria-label="Search by image">
          <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 9a3 3 0 100 6 3 3 0 000-6z"/><path fill="#9aa0a6" d="M9 2L7.17 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2h-3.17L15 2H9zm3 15a5 5 0 110-10 5 5 0 010 10z" opacity=".55"/></svg>
        </button>
      </div>

      <div class="buttons">
        <button type="submit" class="g-btn">Google Search</button>
        <button type="submit" class="g-btn" id="lucky">I'm Feeling Lucky</button>
      </div>
    </form>

    <p class="offered">Google offered in: Français · Español · 中文 · العربية</p>
  </main>

  <footer class="footer">
    <div class="footer-top">United States</div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">About</a><a href="#">Advertising</a><a href="#">Business</a><a href="#">How Search works</a>
      </div>
      <div class="footer-links">
        <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Settings</a>
      </div>
    </div>
  </footer>

  <script src="home.js"></script>
</body>
</html>
