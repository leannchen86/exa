name: Deploy demos to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'claude/public/**'
      - 'claude/diffbot/public/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble site (Exoogle at root, Diffoogle at /diffbot)
        run: |
          rm -rf _site && mkdir -p _site/diffbot
          cp -r claude/public/. _site/
          cp -r claude/diffbot/public/. _site/diffbot/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
