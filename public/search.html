<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1a1a'/%3E%3Ctext x='16' y='24' font-family='Arial' font-size='23' font-weight='700' fill='white' text-anchor='middle'%3Ee%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="serp">
  <header class="serp-header">
    <div class="serp-header-row">
      <a href="index.html" class="logo logo-small" aria-label="Google">
        <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
      </a>
      <form class="serp-search-form" id="searchForm" action="search.html" method="get" autocomplete="off">
        <div class="search-box serp-search-box">
          <input type="text" name="q" id="q" class="search-input" aria-label="Search" />
          <button type="button" class="icon-btn" aria-label="Clear" id="clearBtn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#70757a" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
          <span class="search-divider"></span>
          <button type="button" class="icon-btn" aria-label="Search by voice">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z"/><path fill="#34A853" d="M11 18.92h2V22h-2z"/><path fill="#FBBC05" d="M17.91 11a5.92 5.92 0 01-11.82 0H4.34a7.66 7.66 0 0014.32 0z"/></svg>
          </button>
          <button type="submit" class="icon-btn" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
          </button>
        </div>
      </form>
    </div>
    <nav class="serp-tabs">
      <a class="tab active" href="#">All</a>
      <a class="tab" href="#">Images</a>
      <a class="tab" href="#">News</a>
      <a class="tab" href="#">Videos</a>
      <a class="tab" href="#">Maps</a>
      <a class="tab" href="#">More</a>
    </nav>
  </header>

  <main class="serp-main">
    <div class="serp-controls">
      <div class="serp-stats" id="stats"></div>
      <div class="controls-right">
        <span class="agent-chip" id="agentChip" hidden>retrieval-pilled</span>
        <div class="view-toggle" id="viewToggle" role="tablist" aria-label="View">
          <button class="vt" data-view="human" role="tab">human</button>
          <button class="vt" data-view="agent" role="tab">agent</button>
        </div>
      </div>
    </div>

    <div class="ctx-meter" id="ctxMeter" hidden>
      <div class="ctx-head">
        <span>context window</span>
        <span id="ctxNums">0 / 200,000 tok</span>
      </div>
      <div class="ctx-track"><div class="ctx-fill" id="ctxFill"></div></div>
      <div class="agent-status" id="agentStatus"></div>
    </div>

    <div class="answer-card" id="answer" hidden></div>

    <div id="results"></div>
    <div id="pagination" class="pagination" hidden>
      <span class="logo logo-pagination">
        <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">o</span><span style="color:#34A853">o</span><span style="color:#EA4335">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
      </span>
    </div>
  </main>

  <footer class="footer footer-serp">
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">Help</a><a href="#">Send feedback</a><a href="#">Privacy</a><a href="#">Terms</a>
      </div>
    </div>
  </footer>

  <script src="search.js"></script>
</body>
</html>
